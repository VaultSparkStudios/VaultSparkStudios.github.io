name: Generate Sitemap

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap.xml
        run: |
          BASE="https://vaultsparkstudios.com"
          TODAY=$(date -u +%Y-%m-%d)
          OUT="sitemap.xml"

          # Pages to exclude from sitemap
          # Exclude private/internal pages and generated member SEO pages
          # (member profiles live in member-sitemap.xml instead)
          EXCLUDE="vault-member|investor-portal|\.claude|node_modules|404|member/[^/]+/index"

          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$OUT"
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> "$OUT"

          # Find all index.html files, derive URLs, assign priority
          find . -name "index.html" \
            | grep -vE "$EXCLUDE" \
            | sort \
            | while read -r f; do
            # Strip leading ./ and trailing index.html
            path="${f#./}"
            path="${path%index.html}"
            url="${BASE}/${path}"
            # Remove trailing slash duplicates
            url="${url%/}/"

            # Assign priority by depth
            depth=$(echo "$path" | tr -cd '/' | wc -c)
            if [ "$depth" -le 1 ]; then
              priority="1.0"
              freq="weekly"
            elif [ "$depth" -le 2 ]; then
              priority="0.8"
              freq="weekly"
            else
              priority="0.6"
              freq="monthly"
            fi

            # Homepage special case
            if [ "$url" = "${BASE}//" ] || [ "$url" = "${BASE}/" ]; then
              url="${BASE}/"
              priority="1.0"
            fi

            echo "  <url>" >> "$OUT"
            echo "    <loc>${url}</loc>" >> "$OUT"
            echo "    <lastmod>${TODAY}</lastmod>" >> "$OUT"
            echo "    <changefreq>${freq}</changefreq>" >> "$OUT"
            echo "    <priority>${priority}</priority>" >> "$OUT"
            echo "  </url>" >> "$OUT"
          done

          echo '</urlset>' >> "$OUT"
          echo "Generated $(grep -c '<url>' $OUT) URLs"
          head -30 "$OUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate feed.xml
        run: node scripts/generate-feed.mjs

      - name: Commit generated files if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml feed.xml member-sitemap.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update sitemap + feed [skip ci]"
            # Push with retry — rebase onto any commits (e.g. sw-version bump) that
            # landed in parallel. 3 attempts handles normal race contention.
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "Push attempt $attempt rejected — rebasing on origin/main and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 rebase attempts"
            exit 1
          else
            echo "No changes, skipping commit"
          fi
