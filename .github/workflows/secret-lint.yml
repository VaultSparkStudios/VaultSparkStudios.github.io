name: Secret Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-lint:
    name: Check for secret-adjacent strings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for risky patterns outside approved paths
        run: |
          # Patterns that should not appear as key VALUES in committed files.
          # Key NAMES (like "VAPID_PRIVATE_KEY") are fine to mention in docs.
          # This catches base64-looking values assigned to known secret variable names.

          FAIL=0

          # Match: PRIVATE_KEY = or PRIVATE_KEY: followed by a non-placeholder value
          if grep -rn \
            --include="*.md" --include="*.html" --include="*.js" \
            --include="*.ts" --include="*.json" --include="*.yml" \
            -E "(PRIVATE_KEY|SERVICE_ROLE_KEY|STRIPE_SECRET|RESEND_API_KEY|VAPID_PRIVATE)\s*[=:]\s*['\"]?[A-Za-z0-9+/=_-]{30,}" \
            --exclude-dir=".git" \
            --exclude-dir="node_modules" \
            --exclude-dir="supabase/functions" \
            . ; then
            echo ""
            echo "::error::Possible secret value found in committed file (see matches above)."
            echo "Remove the value and store it in a secrets manager or .env file (gitignored)."
            FAIL=1
          fi

          # Match: service_role key-looking values (Supabase service role JWTs start with eyJ)
          if grep -rn \
            --include="*.md" --include="*.html" --include="*.js" \
            --include="*.ts" --include="*.json" \
            -E "service_role.*eyJ[A-Za-z0-9_-]{40,}" \
            --exclude-dir=".git" \
            --exclude-dir="node_modules" \
            . ; then
            echo ""
            echo "::error::Possible Supabase service role JWT found in committed file."
            FAIL=1
          fi

          if [ $FAIL -eq 1 ]; then
            exit 1
          fi

          echo "Secret lint passed — no risky values found outside approved paths."
