name: E2E Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Compliance gate (no auth required — must always pass) ─────────────────────
  # Runs compliance-pages.spec.js + games.spec.js against local preview.
  # These tests require no secrets and must never be skipped.
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: CSP sync check
        run: node scripts/propagate-csp.mjs --dry-run

      - name: CSP integrity audit
        run: node scripts/csp-audit.mjs

      - name: Public intelligence sync check
        run: npm run build:check

      # Cloudflare can serve managed-challenge HTML to GitHub Actions runner IPs.
      # Required browser gates audit the local artifact so failures reflect repo
      # behavior, not the edge challenge page.
      - name: Start local preview server
        run: |
          node scripts/local-preview-server.mjs &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
        env:
          LOCAL_PREVIEW_HOST: 127.0.0.1
          LOCAL_PREVIEW_PORT: '4173'

      - name: Wait for local preview
        run: npx --yes wait-on --timeout 30000 --interval 500 http://127.0.0.1:4173/

      - name: Run compliance tests
        run: npx playwright test tests/compliance-pages.spec.js tests/games.spec.js --reporter=list --project=chromium
        env:
          BASE_URL: http://127.0.0.1:4173

      - name: Computed render smoke
        run: npx playwright test tests/computed-styles.spec.js --reporter=list --project=chromium
        env:
          BASE_URL: http://127.0.0.1:4173

      - name: Homepage shell regression
        run: npx playwright test tests/homepage-hero-regression.spec.js --reporter=list --project=chromium
        env:
          BASE_URL: http://127.0.0.1:4173

      - name: VaultSparked CSP smoke
        run: npx playwright test tests/vaultsparked-csp.spec.js --reporter=list --project=chromium
        env:
          BASE_URL: http://127.0.0.1:4173

      - name: Vault Wall smoke
        run: npx playwright test tests/vault-wall.spec.js --reporter=list --project=chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        continue-on-error: true

      - name: Light-mode screenshot baseline
        run: npx playwright test tests/light-mode-screenshots.spec.js --reporter=list --project=chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        continue-on-error: true

      - name: Stop local preview
        if: always()
        run: |
          if [ -n "${PREVIEW_PID:-}" ]; then kill "$PREVIEW_PID" || true; fi

      - name: Upload compliance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-results
          path: playwright-report/
          retention-days: 7

      - name: Upload light-mode screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: light-mode-screenshots
          path: test-results/
          retention-days: 14

  # ── Full E2E suite (requires auth secrets — skips gracefully if absent) ────────
  e2e:
    runs-on: ubuntu-latest
    # Only run when auth secrets are available (skips gracefully on forks/dependabot)
    if: ${{ vars.E2E_ENABLED != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Start local preview server
        run: |
          node scripts/local-preview-server.mjs &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
        env:
          LOCAL_PREVIEW_HOST: 127.0.0.1
          LOCAL_PREVIEW_PORT: '4173'

      - name: Wait for local preview
        run: npx --yes wait-on --timeout 30000 --interval 500 http://127.0.0.1:4173/

      - name: Run E2E tests
        run: npx playwright test --reporter=list --project=chromium
        env:
          BASE_URL: http://127.0.0.1:4173
          VAULT_TEST_EMAIL: ${{ secrets.VAULT_TEST_EMAIL }}
          VAULT_TEST_PASSWORD: ${{ secrets.VAULT_TEST_PASSWORD }}
        # If auth secrets aren't configured, authenticated tests will skip via
        # test.skip() guards in the spec files — non-auth tests still run.
        continue-on-error: ${{ secrets.VAULT_TEST_EMAIL == '' }}

      - name: Stop local preview
        if: always()
        run: |
          if [ -n "${PREVIEW_PID:-}" ]; then kill "$PREVIEW_PID" || true; fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: playwright-report/
          retention-days: 7
