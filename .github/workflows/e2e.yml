name: E2E Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Compliance gate (no auth required — must always pass) ─────────────────────
  # Runs compliance-pages.spec.js + games.spec.js against the live site.
  # These tests require no secrets and must never be skipped.
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: CSP sync check
        run: node scripts/propagate-csp.mjs --dry-run

      - name: Run compliance tests
        run: npx playwright test tests/compliance-pages.spec.js tests/games.spec.js --reporter=list --project=chromium
        env:
          BASE_URL: https://vaultsparkstudios.com

      - name: Light-mode screenshot baseline
        run: npx playwright test tests/light-mode-screenshots.spec.js --reporter=list --project=chromium
        env:
          BASE_URL: https://vaultsparkstudios.com
        continue-on-error: true

      - name: Upload compliance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-results
          path: playwright-report/
          retention-days: 7

      - name: Upload light-mode screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: light-mode-screenshots
          path: test-results/
          retention-days: 14

  # ── Full E2E suite (requires auth secrets — skips gracefully if absent) ────────
  e2e:
    runs-on: ubuntu-latest
    # Only run when auth secrets are available (skips gracefully on forks/dependabot)
    if: ${{ vars.E2E_ENABLED != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --reporter=list --project=chromium
        env:
          BASE_URL: https://vaultsparkstudios.com
          VAULT_TEST_EMAIL: ${{ secrets.VAULT_TEST_EMAIL }}
          VAULT_TEST_PASSWORD: ${{ secrets.VAULT_TEST_PASSWORD }}
        # If auth secrets aren't configured, authenticated tests will skip via
        # test.skip() guards in the spec files — non-auth tests still run.
        continue-on-error: ${{ secrets.VAULT_TEST_EMAIL == '' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: playwright-report/
          retention-days: 7
