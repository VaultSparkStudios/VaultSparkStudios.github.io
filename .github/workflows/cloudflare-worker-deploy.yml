name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/**'

jobs:
  deploy-worker:
    name: Deploy Security Headers Worker
    runs-on: ubuntu-latest
    # Requires CF_WORKER_API_TOKEN secret (Cloudflare API token with
    # Workers Scripts: Edit + Zone: Read permissions).
    # CF_WORKER_API_TOKEN is separate from CF_API_TOKEN (cache purge only).
    # Set in: GitHub repo → Settings → Secrets and variables → Actions.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker via Wrangler
        working-directory: cloudflare
        run: npx wrangler@3 deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKER_API_TOKEN }}
