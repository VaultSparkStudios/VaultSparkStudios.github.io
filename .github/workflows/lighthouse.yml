name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cloudflare's WAF returns managed-challenge HTML to GitHub Actions runner
      # IPs, so pointing Lighthouse at https://vaultsparkstudios.com/ audits the
      # challenge page (not the site) and wait-on times out. Running Lighthouse
      # against a local preview server built from the same repo artifacts
      # audits the real shipped HTML/CSS/JS without the WAF in the way.
      - name: Start local preview server
        run: |
          node scripts/local-preview-server.mjs &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
        env:
          LOCAL_PREVIEW_HOST: 127.0.0.1
          LOCAL_PREVIEW_PORT: '4173'

      - name: Wait for local preview
        run: npx --yes wait-on --timeout 30000 --interval 500 http://127.0.0.1:4173/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://127.0.0.1:4173/
            http://127.0.0.1:4173/games/
            http://127.0.0.1:4173/community/
            http://127.0.0.1:4173/leaderboards/
            http://127.0.0.1:4173/journal/
            http://127.0.0.1:4173/ranks/
            http://127.0.0.1:4173/contact/
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop local preview
        if: always()
        run: |
          if [ -n "${PREVIEW_PID:-}" ]; then kill "$PREVIEW_PID" || true; fi
