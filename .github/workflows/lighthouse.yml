name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for GitHub Pages deployment
        # Pages deploys routinely take 3-5 minutes from push to serve; 120s was
        # racing the deploy. 6-minute ceiling with 10s polling is plenty of
        # headroom without dragging the CI run if Pages is already live.
        run: npx --yes wait-on --timeout 360000 --interval 10000 https://vaultsparkstudios.com/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://vaultsparkstudios.com/
            https://vaultsparkstudios.com/games/
            https://vaultsparkstudios.com/community/
            https://vaultsparkstudios.com/leaderboards/
            https://vaultsparkstudios.com/journal/
            https://vaultsparkstudios.com/ranks/
            https://vaultsparkstudios.com/contact/
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
