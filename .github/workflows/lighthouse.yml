name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for GitHub Pages deployment
        run: npx --yes wait-on --timeout 120000 --interval 5000 https://vaultsparkstudios.com/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://vaultsparkstudios.com/
            https://vaultsparkstudios.com/games/
            https://vaultsparkstudios.com/community/
            https://vaultsparkstudios.com/leaderboards/
            https://vaultsparkstudios.com/journal/
            https://vaultsparkstudios.com/ranks/
            https://vaultsparkstudios.com/contact/
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
