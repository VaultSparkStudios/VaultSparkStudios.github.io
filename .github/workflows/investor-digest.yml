name: Monthly Investor Digest

on:
  # Runs at 09:00 UTC on the 1st of every month
  schedule:
    - cron: '0 9 1 * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger investor digest Edge Function
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DIGEST_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_FUNCTION_BASE_URL }}/send-investor-digest")

          echo "HTTP status: $STATUS"
          echo "Response: $(cat /tmp/response.json)"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Digest function returned status $STATUS"
            exit 1
          fi

          SKIPPED=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('skipped','false'))" 2>/dev/null || echo "false")
          if [ "$SKIPPED" = "True" ]; then
            echo "::notice::Digest already sent for this period — skipped."
          fi
