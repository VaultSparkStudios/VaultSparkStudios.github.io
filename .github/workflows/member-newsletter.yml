name: Monthly Member Newsletter

on:
  # Runs at 10:00 UTC on the 2nd of every month (offset from investor digest)
  schedule:
    - cron: '0 10 2 * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger member newsletter Edge Function
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.NEWSLETTER_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_FUNCTION_BASE_URL }}/send-member-newsletter")

          echo "HTTP status: $STATUS"
          echo "Response: $(cat /tmp/response.json)"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Newsletter function returned status $STATUS"
            exit 1
          fi

          SENT=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sent',0))" 2>/dev/null || echo "0")
          echo "::notice::Newsletter sent to $SENT members."
