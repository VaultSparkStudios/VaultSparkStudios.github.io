name: Bump SW Cache Version

# ── RETIRED 2026-04-16 (S80) ─────────────────────────────────────
# This workflow was superseded by the fingerprinted shell-asset pipeline
# added in S77 (`scripts/build-shell-assets.mjs`). That pipeline now owns
# `sw.js`'s CACHE_NAME and derives it from shell-asset content hashes
# (e.g. `vaultspark-shell-9cdaf308e2-...`) instead of date+commit.
#
# The two schemes fought each other: sw-version re-wrote CACHE_NAME on every
# push, and `build:check` in e2e.yml then flagged the result as drift against
# the fingerprint-based expected value. The e2e compliance job has been
# failing intermittently because of this race.
#
# The workflow is kept in-tree with only a manual trigger so the history is
# preserved and so deliberate re-enable is possible, but it no longer fires
# on push. Delete the file once sw-version is confirmed unused for ≥ 5
# sessions.
# ──────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[sw-bump]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump CACHE_NAME with build date
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NEW_VERSION="vaultspark-${DATE}-${SHORT_SHA}"
          echo "Setting CACHE_NAME to: $NEW_VERSION"
          sed -i "s/const CACHE_NAME = '[^']*'/const CACHE_NAME = '$NEW_VERSION'/" sw.js
          grep "CACHE_NAME" sw.js

      - name: Commit updated sw.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          if git diff --cached --quiet; then
            echo "No change to sw.js — skipping commit"
          else
            git commit -m "chore: bump SW cache version [sw-bump]"
            git push
          fi
