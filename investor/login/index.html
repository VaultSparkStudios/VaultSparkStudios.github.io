<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investor Portal | VaultSpark Studios</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="../../assets/favicon.png" />
  <link rel="stylesheet" href="../../assets/style.css" />
  <link rel="stylesheet" href="../../assets/investor-theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../../assets/supabase-client.js"></script>

  <style>
    body.investor-portal {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-wrap {
      width: min(440px, calc(100% - 2rem));
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-brand img {
      height: 36px;
      margin: 0 auto 1rem;
      opacity: 0.9;
    }

    .login-brand h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .login-brand p {
      font-size: 0.88rem;
      color: var(--dim);
    }

    .login-card {
      background: rgba(6, 10, 22, 0.97);
      border: 1px solid rgba(31, 162, 255, 0.15);
      border-radius: 16px;
      padding: 2rem;
    }

    .login-error {
      background: rgba(214,40,40,0.1);
      border: 1px solid rgba(214,40,40,0.25);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      color: #fca5a5;
      margin-bottom: 1.25rem;
      display: none;
    }

    .login-error.visible { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--dim);
    }

    .login-footer a {
      color: rgba(31,162,255,0.7);
    }

    .login-footer a:hover { color: #1FA2FF; }

    .login-confidential {
      text-align: center;
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2rem;
      opacity: 0.5;
    }
  </style>
</head>
<body class="investor-portal">

  <div class="login-wrap">

    <div class="login-brand">
      <img src="../../assets/logo.png" alt="VaultSpark Studios" />
      <h1>Investor Portal</h1>
      <p>VaultSpark Studios — Confidential Access</p>
    </div>

    <div class="login-card">
      <div class="login-error" id="loginError" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="inv-form-group">
          <label class="inv-label" for="loginEmail">Email address</label>
          <input
            class="inv-input"
            type="email"
            id="loginEmail"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="inv-form-group">
          <label class="inv-label" for="loginPassword">Password</label>
          <input
            class="inv-input"
            type="password"
            id="loginPassword"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="inv-btn inv-btn-primary" id="loginBtn"
                style="width:100%; justify-content:center;">
          Sign in
        </button>
      </form>

      <div class="inv-divider"></div>

      <div id="resetSection">
        <p style="font-size:0.82rem; color:var(--dim); margin-bottom:0.75rem;">
          Forgot your password?
        </p>
        <form id="resetForm" novalidate>
          <div style="display:flex; gap:0.5rem;">
            <input
              class="inv-input"
              type="email"
              id="resetEmail"
              placeholder="Email address"
              autocomplete="email"
            />
            <button type="submit" class="inv-btn inv-btn-ghost inv-btn-sm"
                    id="resetBtn" style="flex-shrink:0; white-space:nowrap;">
              Reset
            </button>
          </div>
          <p id="resetMsg" style="font-size:0.8rem; color:var(--muted); margin-top:0.5rem; display:none;"></p>
        </form>
      </div>
    </div>

    <div class="login-footer">
      Not an investor? <a href="https://vaultsparkstudios.com">Return to main site</a>
    </div>

    <div class="login-confidential">Confidential — Authorised access only</div>

  </div>

  <script>
    (async function () {
      const sb = window.VSSupabase;
      const loginForm    = document.getElementById('loginForm');
      const loginBtn     = document.getElementById('loginBtn');
      const loginError   = document.getElementById('loginError');
      const resetForm    = document.getElementById('resetForm');
      const resetBtn     = document.getElementById('resetBtn');
      const resetMsg     = document.getElementById('resetMsg');

      // If already signed in as a valid investor, redirect to dashboard
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data: profile } = await sb.rpc('get_my_investor_profile');
        if (profile && !profile.error) {
          const params = new URLSearchParams(window.location.search);
          const next = params.get('next');
          window.location.replace(
            (next && next.startsWith(window.location.origin)) ? next : '/investor/'
          );
          return;
        }
        await sb.auth.signOut();
      }

      // Show error from redirect
      const params = new URLSearchParams(window.location.search);
      const errCode = params.get('error');
      if (errCode) {
        const msgs = {
          not_investor: 'This account is not registered as an investor. Please contact the studio.',
          rpc_error:    'Could not verify investor access. Please try again.',
        };
        showError(msgs[errCode] || 'Authentication error. Please try again.');
      }

      function showError(msg) {
        loginError.textContent = msg;
        loginError.classList.add('visible');
      }

      function hideError() {
        loginError.classList.remove('visible');
      }

      function setLoading(loading) {
        loginBtn.disabled = loading;
        loginBtn.textContent = loading ? 'Signing in…' : 'Sign in';
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
          showError('Please enter your email and password.');
          return;
        }

        setLoading(true);

        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          setLoading(false);
          showError('Invalid email or password.');
          return;
        }

        // Validate investor access
        const { data: profile, error: rpcErr } = await sb.rpc('get_my_investor_profile');

        if (rpcErr || !profile || profile.error) {
          await sb.auth.signOut();
          setLoading(false);
          showError('This account is not registered as an investor. Please contact the studio.');
          return;
        }

        // Success — redirect
        const next = params.get('next');
        window.location.replace(
          (next && next.startsWith(window.location.origin)) ? next : '/investor/'
        );
      });

      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value.trim();
        if (!email) return;

        resetBtn.disabled = true;
        resetBtn.textContent = '…';

        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/investor/login/'
        });

        resetMsg.style.display = 'block';
        if (error) {
          resetMsg.textContent = 'Error sending reset email. Please try again.';
          resetMsg.style.color = '#ef4444';
        } else {
          resetMsg.textContent = 'Reset email sent. Check your inbox.';
          resetMsg.style.color = 'var(--muted)';
        }

        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset';
      });
    })();
  </script>

</body>
</html>
