<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | VaultSpark Studios</title>

  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(110, 231, 255, 0.14), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(139, 92, 246, 0.18), transparent 26%),
        linear-gradient(180deg, #050814 0%, #060816 42%, #090d1d 100%);

    .wrap {

      width: 100%;
      padding: 2rem;
      border-radius: 24px;
      background: rgba(15, 21, 40, 0.82);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      letter-spacing: -0.04em;
    }
    p {
      color: #a8b3cf;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    a {
      display: inline-block;
      min-height: 48px;
      line-height: 48px;
      padding: 0 1.2rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      color: #03111b;
      background: linear-gradient(135deg, #6ee7ff, #b5f3ff);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
