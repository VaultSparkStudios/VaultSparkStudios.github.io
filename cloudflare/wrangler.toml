name = "vaultspark-security-headers"
main = "security-headers-worker.js"
compatibility_date = "2025-01-01"

[env.production]
routes = [
  { pattern = "vaultsparkstudios.com/*", zone_name = "vaultsparkstudios.com" }
]

[env.production.vars]
# Edge gate for private portals — redirects unauthenticated requests to
# /investor-portal/*, /studio-hub/*, /vault-member/admin/* to the sign-in surface.
# Safe to enable: portals already require JS auth; gate simply moves the redirect to the edge.
PORTAL_GATE_ENABLED = "1"
PORTAL_GATE_COOKIE  = "vs_portal_session"

# CSP nonce injection via HTMLRewriter. Off until staging smoke test confirms no inline-script
# breakage. When flipped to "1", per-request nonce replaces the 73-hash policy with
# 'nonce-X' 'strict-dynamic' + Worker-injected <meta name="csp-nonce"> on every HTML response.
NONCE_CSP_ENABLED = "0"

# Rate-limit on POST to /contact/submit + /ask-founders/submit. Requires RATE_LIMIT KV
# namespace binding (below). Off until the KV namespace is created on an API token with
# Workers KV Storage:Edit scope.
RATE_LIMIT_ENABLED = "0"

# KV namespace binding for rate-limit bucket (commented until the token has KV scope).
# Uncomment + set id once Workers KV Storage is added to the API token scope.
# [[env.production.kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<kv-namespace-id>"
