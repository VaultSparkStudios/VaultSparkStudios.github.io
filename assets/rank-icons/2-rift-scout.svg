  <!-- Tick marks -->
  <line x1="32" y1="14" x2="32" y2="18" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="50" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="18" y2="32" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="50" y2="32" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
</svg>
