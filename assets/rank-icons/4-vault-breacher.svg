<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#0d0f1a"/>
  <!-- Vault door being breached — circle with crack -->
  <circle cx="32" cy="32" r="16" stroke="#8B5CF6" stroke-width="2.5" fill="rgba(139,92,246,0.08)"/>
  <!-- Bolt/handle -->
  <circle cx="32" cy="32" r="5" stroke="#8B5CF6" stroke-width="2" fill="none"/>
  <!-- Crack lines radiating out -->
  <line x1="32" y1="16" x2="36" y2="27" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="36" y1="27" x2="32" y2="32" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="48" y1="22" x2="40" y2="28" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="50" y1="34" x2="40" y2="34" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
