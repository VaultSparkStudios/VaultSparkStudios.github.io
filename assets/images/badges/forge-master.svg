<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Forge Master badge">
  <defs>
    <radialGradient id="fmBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="fmForgeGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#c85000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D62828" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fmAnvilBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="40%" stop-color="#4b5563"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="fmAnvilTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
    <linearGradient id="fmSpark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC400"/>
      <stop offset="60%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#D62828"/>
    </linearGradient>
    <linearGradient id="fmGoldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D62828"/>
      <stop offset="50%" stop-color="#c85000"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="31" fill="url(#fmBg)"/>

  <!-- Forge glow beneath anvil -->
  <ellipse cx="32" cy="46" rx="16" ry="8" fill="url(#fmForgeGlow)"/>

  <!-- Border ring — crimson/fire -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#fmGoldRing)" stroke-width="1.5" opacity="0.7"/>

  <!-- Anvil base / pedestal -->
  <rect x="23" y="44" width="18" height="5" rx="2" fill="url(#fmAnvilBody)"/>
  <!-- Anvil waist -->
  <rect x="27" y="40" width="10" height="5" rx="1" fill="#374151"/>
  <!-- Anvil body / main block -->
  <rect x="17" y="32" width="30" height="10" rx="3" fill="url(#fmAnvilBody)"/>
  <!-- Anvil top face (lighter) -->
  <rect x="17" y="32" width="30" height="4" rx="2" fill="url(#fmAnvilTop)"/>
  <!-- Anvil horn (left protrusion) -->
  <path d="M17,34 Q9,34 10,38 L17,38 Z" fill="#4b5563"/>
  <!-- Anvil horn highlight -->
  <path d="M17,34 Q11,34 11,36 L17,36 Z" fill="#6b7280" opacity="0.6"/>

  <!-- Spark burst above anvil (impact point) -->
  <!-- Central spark core -->
  <circle cx="32" cy="26" r="3.5" fill="#FFC400" opacity="0.95"/>
  <circle cx="32" cy="26" r="2" fill="white" opacity="0.7"/>

  <!-- Spark rays -->
  <line x1="32" y1="19" x2="32" y2="22" stroke="url(#fmSpark)" stroke-width="2" stroke-linecap="round"/>
  <line x1="38.2" y1="20.8" x2="36" y2="23.4" stroke="url(#fmSpark)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="40.5" y1="26" x2="37" y2="26" stroke="url(#fmSpark)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="38.2" y1="31.2" x2="35.8" y2="28.8" stroke="url(#fmSpark)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25.8" y1="20.8" x2="28" y2="23.4" stroke="url(#fmSpark)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="23.5" y1="26" x2="27" y2="26" stroke="url(#fmSpark)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="25.8" y1="31.2" x2="28.2" y2="28.8" stroke="url(#fmSpark)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Floating ember sparks -->
  <circle cx="39" cy="18" r="1.2" fill="#FF7A00" opacity="0.8"/>
  <circle cx="24" cy="17" r="0.9" fill="#FFC400" opacity="0.7"/>
  <circle cx="42" cy="22" r="0.8" fill="#FFC400" opacity="0.6"/>
  <circle cx="22" cy="23" r="1" fill="#FF7A00" opacity="0.65"/>
  <circle cx="35" cy="15" r="0.7" fill="#D62828" opacity="0.75"/>
</svg>
