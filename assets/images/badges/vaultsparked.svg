<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="VaultSparked badge">
  <defs>
    <radialGradient id="vsCrystalBg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="vsCrystalGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vsCrystalFace" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="vsCrystalLeft" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="vsCrystalRight" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="vsGoldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#FFC400"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#vsCrystalBg)"/>

  <!-- Glow halo behind crystal -->
  <ellipse cx="32" cy="34" rx="18" ry="14" fill="url(#vsCrystalGlow)"/>

  <!-- Gold border ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#vsGoldRing)" stroke-width="1.5" opacity="0.7"/>

  <!-- Crystal gem — hexagon-like faceted shape -->
  <!-- Top cap -->
  <polygon points="32,10 42,20 22,20" fill="#c084fc" opacity="0.9"/>
  <!-- Left upper facet -->
  <polygon points="22,20 32,10 20,34" fill="url(#vsCrystalLeft)"/>
  <!-- Right upper facet -->
  <polygon points="42,20 32,10 44,34" fill="url(#vsCrystalRight)"/>
  <!-- Centre main face -->
  <polygon points="22,20 42,20 44,34 32,48 20,34" fill="url(#vsCrystalFace)"/>
  <!-- Bottom left facet -->
  <polygon points="20,34 32,48 24,44" fill="#7c3aed" opacity="0.85"/>
  <!-- Bottom right facet -->
  <polygon points="44,34 32,48 40,44" fill="#9333ea" opacity="0.85"/>

  <!-- Inner highlight on main face -->
  <polygon points="28,22 36,22 38,30 32,38 26,30" fill="white" opacity="0.07"/>
  <polygon points="30,22 34,22 35,27 32,32 29,27" fill="white" opacity="0.12"/>

  <!-- Top-left shine -->
  <ellipse cx="27" cy="24" rx="3.5" ry="2" fill="white" opacity="0.18" transform="rotate(-20 27 24)"/>

  <!-- Gold accent spark at crown -->
  <circle cx="32" cy="10" r="2" fill="#FFC400" opacity="0.9"/>
  <line x1="32" y1="6" x2="32" y2="8" stroke="#FFC400" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28.8" y1="7.4" x2="30.2" y2="8.8" stroke="#FFC400" stroke-width="1" stroke-linecap="round"/>
  <line x1="35.2" y1="7.4" x2="33.8" y2="8.8" stroke="#FFC400" stroke-width="1" stroke-linecap="round"/>
</svg>
