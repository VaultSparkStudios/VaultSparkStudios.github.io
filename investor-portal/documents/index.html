<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Vault | VaultSpark Studios Investor Portal</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="../../assets/favicon.png" />
  <link rel="stylesheet" href="../../assets/style.css" />
  <link rel="stylesheet" href="../../assets/investor-theme.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../../assets/supabase-client.js"></script>
  <script src="../../assets/investor-auth.js"></script>
  <script src="../../assets/investor-ui.js"></script>

  <style>
    .inv-doc-group { margin-bottom: 2.5rem; }
    .inv-doc-group-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
      padding: 0 0 0.65rem;
      margin-bottom: 0.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* Wrap all doc tables in a horizontal scroll container */
    .inv-doc-group .inv-doc-table {
      display: block; /* becomes block so parent can scroll */
    }

    .inv-doc-group-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    @media (max-width: 480px) {
      .inv-doc-group { margin-bottom: 1.75rem; }
      /* On 480px, hide the size column (4th) to save space */
      .inv-doc-table th:nth-child(4),
      .inv-doc-table td:nth-child(4) { display: none; }
    }
  </style>

  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
</head>
<body class="investor-portal">

  <!-- Nav -->
  <nav class="inv-nav">
    <div class="container inv-nav-inner">
      <div class="inv-nav-brand">
        <img src="../../assets/logo.png" alt="" style="height:22px; opacity:0.8;" />
        <span><strong>VaultSpark</strong> Investor Portal</span>
      </div>
      <div class="inv-nav-links">
        <a href="/investor-portal/" class="inv-nav-link">Dashboard</a>
        <a href="/investor-portal/updates/" class="inv-nav-link">Updates</a>
        <a href="/investor-portal/documents/" class="inv-nav-link active">Documents</a>
        <a href="/investor-portal/message/" class="inv-nav-link">Message</a>
        <a href="/investor-portal/profile/" class="inv-nav-link">Profile</a>
      </div>
      <div class="inv-nav-actions">
        <span class="inv-nav-user" id="navUserName"></span>
        <button class="inv-nav-mobile-toggle" id="mobileToggle" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="5" width="16" height="1.5" rx="0.75" fill="currentColor"/>
            <rect x="2" y="9.25" width="16" height="1.5" rx="0.75" fill="currentColor"/>
            <rect x="2" y="13.5" width="16" height="1.5" rx="0.75" fill="currentColor"/>
          </svg>
        </button>
        <button class="inv-btn inv-btn-ghost inv-btn-sm" id="signOutBtn">Sign out</button>
      </div>
    </div>
  </nav>
  <div class="inv-nav-mobile-menu" id="mobileMenu">
    <a href="/investor-portal/" class="inv-nav-mobile-link">Dashboard</a>
    <a href="/investor-portal/updates/" class="inv-nav-mobile-link">Updates</a>
    <a href="/investor-portal/documents/" class="inv-nav-mobile-link active">Documents</a>
    <a href="/investor-portal/message/" class="inv-nav-mobile-link">Message Studio</a>
    <a href="/investor-portal/profile/" class="inv-nav-mobile-link">Profile</a>
  </div>

  <!-- Content -->
  <div class="inv-page">
    <div class="container">

      <div class="inv-header">
        <h1>Document Vault</h1>
        <p>All documents are confidential. Access is logged for security.</p>
      </div>

      <div id="docsContainer">
        <div class="inv-skeleton inv-skeleton-card"></div>
        <div class="inv-skeleton inv-skeleton-card"></div>
      </div>

    </div>
  </div>

  <script>
    const UI = window.VSInvestorUI;
    const sb = window.VSSupabase;

    const DOC_TYPE_ORDER = [
      'pitch_deck', 'financials', 'cap_table',
      'product_roadmap', 'legal', 'general'
    ];

    document.getElementById('signOutBtn').addEventListener('click', () => {
      window.VSInvestorAuth.signOut();
    });

    window.addEventListener('investor:ready', async (e) => {
      document.getElementById('navUserName').textContent = e.detail.display_name;
      window._investorProfile = e.detail;
      await loadDocuments();
    });

    async function loadDocuments() {
      const { data, error } = await sb
        .from('investor_documents')
        .select('id, title, description, document_type, version, uploaded_at, file_size_bytes, visibility_scope')
        .eq('is_active', true)
        .order('uploaded_at', { ascending: false });

      const container = document.getElementById('docsContainer');

      if (error) {
        container.innerHTML = '<div class="inv-empty">Failed to load documents. Please refresh.</div>';
        return;
      }

      const docs = data || [];

      if (docs.length === 0) {
        container.innerHTML = '<div class="inv-empty">No documents available yet.</div>';
        return;
      }

      // Group by document_type
      const groups = {};
      docs.forEach(d => {
        if (!groups[d.document_type]) groups[d.document_type] = [];
        groups[d.document_type].push(d);
      });

      // Render in defined order, then any remaining types
      const orderedTypes = [
        ...DOC_TYPE_ORDER.filter(t => groups[t]),
        ...Object.keys(groups).filter(t => !DOC_TYPE_ORDER.includes(t))
      ];

      container.innerHTML = orderedTypes.map(type => `
        <div class="inv-doc-group">
          <div class="inv-doc-group-title">${UI.escHtml(UI.docTypeLabel(type))}</div>
          <div class="inv-doc-group-table-wrap">
            <table class="inv-doc-table">
              <thead>
                <tr>
                  <th>Document</th>
                  <th>Version</th>
                  <th>Date</th>
                  <th>Size</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${groups[type].map(d => UI.renderDocumentRow(d)).join('')}
              </tbody>
            </table>
          </div>
        </div>`).join('');

      wireDownloadButtons(container);
    }

    function wireDownloadButtons(container) {
      container.querySelectorAll('.inv-doc-download-btn').forEach(btn => {
        btn.addEventListener('click', async function () {
          const id    = this.dataset.id;
          const title = this.dataset.title;
          this.disabled = true;
          this.textContent = '…';

          const { data, error } = await sb.rpc('get_investor_document_url', {
            p_document_id: id
          });

          this.disabled = false;
          this.textContent = 'Open';

          if (error || !data || data.error) {
            UI.showToast(data?.error || 'Could not open document.', 'error');
            return;
          }

          if (data.url) {
            window.open(data.url, '_blank', 'noopener');
            UI.showToast(`Opening: ${title}`, 'success');
            // Log access
            try {
              await sb.from('investor_document_access').insert({
                document_id: id,
                document_title: title,
                investor_id: window._investorProfile?.id || null,
                investor_name: window._investorProfile?.display_name || null
              });
            } catch (_) {}
          } else {
            UI.showToast('Document URL unavailable. Contact the studio.', 'error');
          }
        });
      });
    }

    document.getElementById('mobileToggle')?.addEventListener('click', () => {
      document.getElementById('mobileMenu')?.classList.toggle('open');
    });
  </script>

</body>
</html>
