<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investor Profile | VaultSpark Studios</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="../../assets/favicon.png" />
  <link rel="stylesheet" href="../../assets/style.css" />
  <link rel="stylesheet" href="../../assets/investor-theme.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../../assets/supabase-client.js"></script>
  <script src="../../assets/investor-auth.js"></script>
  <script src="../../assets/investor-ui.js"></script>

  <style>
    .inv-profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 800px;
    }

    .inv-field-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-bottom: 0.3rem;
    }

    .inv-field-value {
      font-size: 1rem;
      color: var(--text);
    }

    .inv-field-group {
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .inv-field-group:first-child { padding-top: 0; }
    .inv-field-group:last-child  { border-bottom: none; }

    @media (max-width: 600px) {
      .inv-profile-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="investor-portal">

  <!-- Nav -->
  <nav class="inv-nav">
    <div class="container inv-nav-inner">
      <div class="inv-nav-brand">
        <img src="../../assets/logo.png" alt="" style="height:22px; opacity:0.8;" />
        <span><strong>VaultSpark</strong> Investor Portal</span>
      </div>
      <div class="inv-nav-links">
        <a href="/investor-portal/" class="inv-nav-link">Dashboard</a>
        <a href="/investor-portal/updates/" class="inv-nav-link">Updates</a>
        <a href="/investor-portal/documents/" class="inv-nav-link">Documents</a>
        <a href="/investor-portal/profile/" class="inv-nav-link active">Profile</a>
      </div>
      <div class="inv-nav-actions">
        <span class="inv-nav-user" id="navUserName"></span>
        <button class="inv-btn inv-btn-ghost inv-btn-sm" id="signOutBtn">Sign out</button>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="inv-page">
    <div class="container">

      <div class="inv-header">
        <h1>Your Profile</h1>
        <p>Your investor record as held by VaultSpark Studios. Contact the studio to request changes.</p>
      </div>

      <div class="inv-card" style="max-width:800px;" id="profileCard">
        <div class="inv-skeleton inv-skeleton-card"></div>
      </div>

      <div style="margin-top:1.5rem; max-width:800px;">
        <div class="inv-card">
          <h2 class="inv-section-title">Recent Activity</h2>
          <div id="profileActivity">
            <div class="inv-skeleton inv-skeleton-row"></div>
            <div class="inv-skeleton inv-skeleton-row"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const UI = window.VSInvestorUI;
    const sb = window.VSSupabase;

    document.getElementById('signOutBtn').addEventListener('click', () => {
      window.VSInvestorAuth.signOut();
    });

    window.addEventListener('investor:ready', async (e) => {
      const profile = e.detail;
      document.getElementById('navUserName').textContent = profile.display_name;

      VSInvestorAuth.logAction('profile_view');
      renderProfile(profile);
      loadActivity();
    });

    function renderProfile(p) {
      const entityLabels = {
        individual: 'Individual', firm: 'Firm',
        angel: 'Angel Investor', fund: 'Fund'
      };
      const statusLabels = {
        active: 'Active', inactive: 'Inactive', exited: 'Exited'
      };

      document.getElementById('profileCard').innerHTML = `
        <div class="inv-profile-grid">
          <div>
            <div class="inv-field-group">
              <div class="inv-field-label">Name / Entity</div>
              <div class="inv-field-value">${UI.escHtml(p.display_name)}</div>
            </div>
            <div class="inv-field-group">
              <div class="inv-field-label">Entity type</div>
              <div class="inv-field-value">${UI.escHtml(entityLabels[p.entity_type] || p.entity_type)}</div>
            </div>
            <div class="inv-field-group">
              <div class="inv-field-label">Investor tier</div>
              <div class="inv-field-value">${UI.renderTierBadge(p.tier)}</div>
            </div>
            <div class="inv-field-group">
              <div class="inv-field-label">Status</div>
              <div class="inv-field-value">
                <span class="inv-status-dot ${p.status}"></span>
                ${UI.escHtml(statusLabels[p.status] || p.status)}
              </div>
            </div>
          </div>
          <div>
            <div class="inv-field-group">
              <div class="inv-field-label">Investment date</div>
              <div class="inv-field-value">${UI.formatDate(p.investment_date)}</div>
            </div>
            <div class="inv-field-group">
              <div class="inv-field-label">Onboarded to portal</div>
              <div class="inv-field-value">${UI.formatDate(p.onboarded_at)}</div>
            </div>
            <div class="inv-field-group">
              <div class="inv-field-label">Available updates</div>
              <div class="inv-field-value">${p.update_count}</div>
            </div>
            <div class="inv-field-group">
              <div class="inv-field-label">Available documents</div>
              <div class="inv-field-value">${p.document_count}</div>
            </div>
          </div>
        </div>
        <div class="inv-divider"></div>
        <p style="font-size:0.8rem; color:var(--dim);">
          To request changes to your profile or access level, contact
          <a href="mailto:studio@vaultsparkstudios.com"
             style="color:rgba(31,162,255,0.75);">studio@vaultsparkstudios.com</a>.
        </p>`;
    }

    async function loadActivity() {
      const { data: events } = await sb
        .from('investor_activity')
        .select('action, target_label, created_at')
        .order('created_at', { ascending: false })
        .limit(10);

      const area = document.getElementById('profileActivity');

      if (!events || events.length === 0) {
        area.innerHTML = '<div class="inv-empty" style="padding:0.5rem 0;">No activity on record.</div>';
        return;
      }

      area.innerHTML = events.map(e => UI.renderActivityRow(e)).join('');
    }
  </script>

</body>
</html>
